name: Build, Scan, and Report to Upwind

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: upwind-lab-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-report:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 1. Checkout code
      # -------------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # 2. Build the Docker image locally
      # -------------------------------------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      # -------------------------------------------------------
      # 3. Shift Left Image Scan (vulnerability scanning)
      # -------------------------------------------------------
      - name: Shift Left Image Scan
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          pull_image: false  # Image was built locally in the previous step

      # -------------------------------------------------------
      # 4. (Optional) Shift Left PR Comment
      #    Only runs on pull requests
      # -------------------------------------------------------
      - name: Shift Left PR Comment
        if: github.event_name == 'pull_request'
        uses: upwindsecurity/shiftleft-create-image-scan-event-action@main
        with:
          upwind_client_id: ${{ secrets.UPWIND_CLIENT_ID }}
          upwind_client_secret: ${{ secrets.UPWIND_CLIENT_SECRET }}
          docker_image: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          pull_image: false
          add_comment: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.number }}
          repo_name: ${{ github.repository }}

      # -------------------------------------------------------
      # 5. Report CI event to Upwind (event correlation)
      # -------------------------------------------------------
      - name: Report Build Event to Upwind
        env:
          IMAGE: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          IMAGE_SHA: ${{ github.sha }}
          UPWIND_API_ENDPOINT: https://api.upwind.io
          UPWIND_AUTH_ENDPOINT: https://auth.upwind.io
          UPWIND_ORGANIZATION_ID: ${{ secrets.UPWIND_ORGANIZATION_ID }}
          UPWIND_CLIENT_SECRET: ${{ secrets.UPWIND_ORG_CLIENT_SECRET }}
          UPWIND_CLIENT_ID: ${{ secrets.UPWIND_ORG_CLIENT_ID }}
        run: |
          # Authenticate and get access token
          response=$(curl -s --location "${UPWIND_AUTH_ENDPOINT}/oauth/token" \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "audience=${UPWIND_API_ENDPOINT}" \
            --data-urlencode "client_id=${UPWIND_CLIENT_ID}" \
            --data-urlencode "client_secret=${UPWIND_CLIENT_SECRET}")

          ACCESS_TOKEN=$(echo "$response" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to obtain access token from Upwind"
            echo "Auth response: $response"
            exit 1
          fi

          echo "Successfully obtained Upwind access token"

          # Report the build event
          HTTP_CODE=$(curl -fsSL "${UPWIND_API_ENDPOINT}/v1/organizations/${UPWIND_ORGANIZATION_ID}/events" \
            --request POST \
            --write-out "%{http_code}" \
            --output /tmp/upwind_response.json \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data "{
              \"type\": \"image_build\",
              \"reporter\": \"github_actions\",
              \"data\": {
                \"image\": \"${IMAGE}\",
                \"commit_sha\": \"${GITHUB_SHA}\",
                \"repository\": \"https://github.com/${GITHUB_REPOSITORY}.git\",
                \"branch\": \"${GITHUB_REF_NAME}\",
                \"image_sha\": \"${IMAGE_SHA}\",
                \"build_time\": \"$(date +'%Y-%m-%dT%H:%M:%SZ')\"
              }
            }")

          echo "Upwind API response code: $HTTP_CODE"
          cat /tmp/upwind_response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Upwind event API returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Build event reported to Upwind successfully"
